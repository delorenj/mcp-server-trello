name: Publish to NPM

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual escape hatch: re-publish the current main without re-merging a PR.
  workflow_dispatch:

jobs:
  publish-npm:
    # Run on a merged PR, or on a manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing (no NPM_TOKEN needed)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted Publishing requires Node >= 22.14.0.
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        # Trusted Publishing requires npm CLI >= 11.5.1.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Publish to NPM (Trusted Publishing / OIDC)
        # No NODE_AUTH_TOKEN: auth is via the OIDC id-token above.
        # Provenance is generated and attested automatically under Trusted Publishing.
        run: npm publish
