name: Publish to MCP Registry

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths: ['server.json', 'package.json']

concurrency:
  group: publish-registry-delorenj-mcp-server-trello
  cancel-in-progress: false

env:
  # Reviewed upstream release v1.7.9.
  MCP_REGISTRY_COMMIT: 35b20719ee7714ad18d0f81af6798ac0a46e2b9b

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package and registry manifest versions
        run: |
          node <<'NODE'
          const packageJson = require('./package.json');
          const manifest = require('./server.json');
          const npmPackage = manifest.packages.find(
            (entry) => entry.registryType === 'npm' && entry.identifier === packageJson.name
          );
          const versions = {
            package: packageJson.version,
            server: manifest.version,
            registryPackage: npmPackage?.version,
          };
          if (!npmPackage || new Set(Object.values(versions)).size !== 1) {
            console.error('Version parity check failed:', versions);
            process.exit(1);
          }
          console.log(`Version parity verified: ${packageJson.name}@${packageJson.version}`);
          NODE

      - name: Build project
        run: bun run build

      - name: Build pinned mcp-publisher
        run: |
          git init /tmp/registry
          git -C /tmp/registry remote add origin https://github.com/modelcontextprotocol/registry.git
          git -C /tmp/registry fetch --depth 1 origin "$MCP_REGISTRY_COMMIT"
          git -C /tmp/registry checkout --detach FETCH_HEAD
          cd /tmp/registry
          make publisher
          cp bin/mcp-publisher $GITHUB_WORKSPACE/

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
